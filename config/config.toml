# Humanize-Text v1.5.1 Configuration

[general]
# Target language for final output
target_language = "en"
# Log level: debug, info, warning, error
log_level = "info"

[api_keys]
# DeepSeek API key (required when llm.provider = "deepseek")
deepseek_api_key = "ollama"
# OpenRouter API key (required when llm.provider = "openrouter")
openrouter_api_key = ""
# Niutrans API key (required for Step 4: 二轮翻译)
niutrans_api_key = ""

[llm]
# LLM provider: "deepseek" | "openrouter"
provider = "deepseek"
# Override API base URL (empty = provider default)
base_url = "http://localhost:11434/v1"
# Model slug (empty = provider default)
#model = "qwen2.5:7b"
#model = "qwen2.5-16k:default"
model = "qwen2.5-16k:latest"
# Temperature for LLM rewriting (1.3 recommended)
temperature = 1.3
# OpenRouter optional site attribution (for openrouter.ai rankings)
http_referer = ""
app_title = ""
timeout=600
top_p = 0.92
#top_k = 40

[translator]
base_url = "http://localhost:11434"
#model = "qwen2.5:7b"
#model = "qwen2.5-16k:default"
model = "qwen2.5-16k:latest"
# Temperature for translation should be lower
temperature = 0.4       # Best balance for translation
top_p = 0.90
top_k = 40
timeout=600
max_tokens=6144

#step 3 treanslation from JA-FI using libre
libre_url="http://localhost:5000/translate"

[pipeline]
# model / temperature kept for backward compat; [llm] takes precedence
model = "deepseek-chat"
temperature = 1.3
# Intermediate language for the cross-engine translation hop (Step 3 → Step 4).
# Finnish ("fi") is the default — agglutinative morphology forces deep
# restructuring before reconstruction to the target language.
# Other tested options: "de" (German), "ko" (Korean)
intermediate_lang = "fi"
